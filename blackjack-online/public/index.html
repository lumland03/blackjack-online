<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Blackjack</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JQKAS&display=swap" rel="stylesheet">

    <script src="/socket.io/socket.io.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #080000;
            background: radial-gradient(circle,rgba(8, 0, 0, 1) 0%, rgba(92, 0, 0, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'JQKAS', serif;
        }
        * {
            font-family: 'JQKAS', serif;
        }
        #game-container {
            border: 2px solid #D4AF37; /* Gold border for a classy casino feel */
        }
        #error-message {
            color: #ff0000;
            font-size: 16px;
            position: absolute;
            top: 10px;
            left: 10px;
            background: #000;
            padding: 10px;
            max-width: 300px;
            font-family: 'JQKAS', serif;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script src="game.js"></script>

</body>
</html>
